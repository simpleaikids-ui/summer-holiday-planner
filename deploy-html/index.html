function getDIM(m, y) { return new Date(y, m + 1, 0).getDate(); }
function getFDOW(m, y) { return new Date(y, m, 1).getDay(); }
function dk(y, m, d) {
  return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}
function today() {
  const t = new Date();
  return dk(t.getFullYear(), t.getMonth(), t.getDate());
}
function parsedk(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m, d);
}
function fmtDate(s) {
  if (!s) return "";
  return parsedk(s).toLocaleDateString("en-US", {
    weekday: "short", month: "short", day: "numeric"
  });
}
function weekDatesFor(ref) {
  const d = new Date(ref);
  const sun = new Date(d);
  sun.setDate(d.getDate() - d.getDay());
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(sun);
    x.setDate(sun.getDate() + i);
    return dk(x.getFullYear(), x.getMonth(), x.getDate());
  });
}
function expandRec(start, end, dow) {
  const dates = [];
  const s = new Date(start);
  const e = new Date(end);
  const d = new Date(s);
  while (d.getDay() !== dow) d.setDate(d.getDate() + 1);
  while (d <= e) {
    dates.push(dk(d.getFullYear(), d.getMonth(), d.getDate()));
    d.setDate(d.getDate() + 7);
  }
  return dates;
}
function daysLeft(endDate) {
  return Math.max(0, Math.ceil((new Date(endDate) - new Date()) / 86400000));
}
function getWeekStartDate(dateStr) {
  const d = parsedk(dateStr);
  const sun = new Date(d);
  sun.setDate(d.getDate() - d.getDay());
  return dk(sun.getFullYear(), sun.getMonth(), sun.getDate());
}

/* ─── Weather (real via Open-Meteo API, today only) ─── */
const WMO_MAP = {
  0: { icon: "☀️", label: "Clear Sky", indoor: false },
  1: { icon: "🌤️", label: "Mainly Clear", indoor: false },
  2: { icon: "⛅", label: "Partly Cloudy", indoor: false },
  3: { icon: "☁️", label: "Overcast", indoor: false },
  45: { icon: "🌫️", label: "Foggy", indoor: false },
  48: { icon: "🌫️", label: "Foggy", indoor: false },
  51: { icon: "🌦️", label: "Light Drizzle", indoor: false },
  53: { icon: "🌧️", label: "Drizzle", indoor: true },
  55: { icon: "🌧️", label: "Heavy Drizzle", indoor: true },
  61: { icon: "🌧️", label: "Light Rain", indoor: true },
  63: { icon: "🌧️", label: "Rain", indoor: true },
  65: { icon: "🌧️", label: "Heavy Rain", indoor: true },
  66: { icon: "🌧️", label: "Freezing Rain", indoor: true },
  67: { icon: "🌧️", label: "Freezing Rain", indoor: true },
  71: { icon: "🌨️", label: "Light Snow", indoor: false },
  73: { icon: "🌨️", label: "Snow", indoor: true },
  75: { icon: "🌨️", label: "Heavy Snow", indoor: true },
  80: { icon: "🌧️", label: "Rain Showers", indoor: true },
  81: { icon: "🌧️", label: "Rain Showers", indoor: true },
  82: { icon: "🌧️", label: "Heavy Showers", indoor: true },
  95: { icon: "⛈️", label: "Thunderstorm", indoor: true },
  96: { icon: "⛈️", label: "Thunderstorm", indoor: true },
  99: { icon: "⛈️", label: "Severe Storm", indoor: true },
};
function wmoLookup(code) {
  return WMO_MAP[code] || { icon: "🌤️", label: "Fair", indoor: false };
}

/* Fetch today's real weather for a zip code via Open-Meteo (free, no key).
   Returns null if the API is unavailable (e.g. sandboxed artifact). */
async function fetchTodayWeather(zip) {
  try {
    const geoRes = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(zip)}&count=1&language=en&format=json`
    );
    const geoData = await geoRes.json();
    if (!geoData.results || geoData.results.length === 0) return null;
    const { latitude: lat, longitude: lon, name: locName } = geoData.results[0];
    const wxRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&daily=temperature_2m_max,temperature_2m_min,weather_code` +
      `&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`
    );
    const wxData = await wxRes.json();
    if (!wxData.daily || !wxData.daily.time.length) return null;
    const wmo = wmoLookup(wxData.daily.weather_code[0]);
    return {
      locName,
      hi: Math.round(wxData.daily.temperature_2m_max[0]),
      lo: Math.round(wxData.daily.temperature_2m_min[0]),
      icon: wmo.icon,
      label: wmo.label,
      indoor: wmo.indoor,
    };
  } catch (err) {
    return null; // API blocked or network error
  }
}

/* ─── Confetti ─── */
function Confetti({ show, onDone }) {
  const [pts, setPts] = useState([]);
  useEffect(() => {
    if (!show) return;
    setPts(Array.from({ length: 40 }, (_, i) => ({
      id: i, x: Math.random() * 100, dl: Math.random() * 0.5,
      col: ["#f59e0b", "#3b82f6", "#ef4444", "#10b981", "#8b5cf6", "#ec4899"][i % 6],
      sz: 5 + Math.random() * 7,
    })));
    const t = setTimeout(() => { setPts([]); onDone?.(); }, 2000);
    return () => clearTimeout(t);
  }, [show]);
  if (!pts.length) return null;
  return (
    <div className="fixed inset-0 pointer-events-none z-50">
      {pts.map(p => (
        <div key={p.id} className="absolute" style={{
          left: `${p.x}%`, top: -10, width: p.sz, height: p.sz,
          backgroundColor: p.col, borderRadius: p.sz > 8 ? "50%" : "2px",
          animation: `cfall 1.5s ease-in ${p.dl}s forwards`,
        }} />
      ))}
      <style>{`@keyframes cfall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}`}</style>
    </div>
  );
}

  const [cMonth, setCMonth] = useState(4);
  const [selDate, setSelDate] = useState(today());
  const [weekRef, setWeekRef] = useState(new Date());

  // Per-child state maps
  const init = (def) => Object.fromEntries(children.map(c => [c.id, typeof def === "function" ? def() : def]));
  const [aTask, setATask] = useState(() => init(() => []));
  const [aEvt, setAEvt] = useState(() => init(() => []));
  const [famEvt, setFamEvt] = useState([]);
  const [aPts, setAPts] = useState(() => init(0));
  const [aStrk, setAStrk] = useState(() => init(0));
  const [aRew, setARew] = useState(() => init(() => [...DEF_REWARDS]));
  const [aRedm, setARedm] = useState(() => init(() => []));
  const [aCollect, setACollect] = useState(() => init(() => []));
  const [aDrawEntries, setADrawEntries] = useState(() => init(() => []));
  const [aDrawResults, setADrawResults] = useState(() => init(() => []));
  const [aAvatar, setAAvatar] = useState(() => init(() => ({ body: "#F5D0A9", hair: "👦", eyes: "👀", mouth: "😊", accessory: "" })));
  const [aJournal, setAJournal] = useState(() => init(() => []));
  const [leaderboardOn, setLeaderboardOn] = useState(true);

  // Weather – real forecast for today only (via Open-Meteo API)
  const [todayWx, setTodayWx] = useState(null); // { locName, hi, lo, icon, label, indoor } or null
  const [wxLoading, setWxLoading] = useState(true);

  useEffect(() => {
    if (!profile.zip) { setWxLoading(false); return; }
    let cancelled = false;
    (async () => {
      setWxLoading(true);
      const result = await fetchTodayWeather(profile.zip);
      if (!cancelled) { setTodayWx(result); setWxLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [profile.zip]);

  const tasks = aTask[childId] || [];
  const evts = aEvt[childId] || [];
  const pts = aPts[childId] || 0;
  const strk = aStrk[childId] || 0;
  const rews = aRew[childId] || DEF_REWARDS;
  const rdmd = aRedm[childId] || [];
  const collect = aCollect[childId] || [];
  const drawEntries = aDrawEntries[childId] || [];
  const drawResults = aDrawResults[childId] || [];

  const sT = fn => setATask(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sE = fn => setAEvt(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sP = fn => setAPts(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || 0) : fn }));
  const sS = fn => setAStrk(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || 0) : fn }));
  const sR = fn => setARew(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || DEF_REWARDS) : fn }));
  const sD = fn => setARedm(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sCollect = fn => setACollect(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sDrawE = fn => setADrawEntries(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sDrawR = fn => setADrawResults(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sAvatar = fn => setAAvatar(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || { body: "#F5D0A9", hair: "👦", eyes: "👀", mouth: "😊", accessory: "" }) : fn }));
  const sJournal = fn => setAJournal(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));

  const avatar = aAvatar[childId] || { body: "#F5D0A9", hair: "👦", eyes: "👀", mouth: "😊", accessory: "" };
  const journal = aJournal[childId] || [];

  const [confetti, setConfetti] = useState(false);
  const [notifications, setNotifications] = useState([]);

  const addNotif = (title, message, icon, type) => {
    const id = `n${Date.now()}`;
    setNotifications(prev => [...prev, { id, title, message, icon, type }]);
    setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 5000);
  };
  const dismissNotif = (id) => setNotifications(prev => prev.filter(n => n.id !== id));

  const [mAddTask, setMAddTask] = useState(false);
  const [mAddEvt, setMAddEvt] = useState(false);
  const [mSugg, setMSugg] = useState(false);
  const [mAddRew, setMAddRew] = useState(false);
  const [mEditRew, setMEditRew] = useState(null);
  const [mTmpl, setMTmpl] = useState(false);
  const [mDraw, setMDraw] = useState(false);
  const [nTask, setNTask] = useState({ title: "", cat: "academic", diff: "easy", date: "" });
  const [nEvt, setNEvt] = useState({ title: "", date: "", time: "", rec: false, rDays: [], fam: false, mand: false });
  const [nRew, setNRew] = useState({ name: "", cost: 100, icon: "🎁" });
  const [dragId, setDragId] = useState(null);
  const [drawWinner, setDrawWinner] = useState(null);

  const [mJournal, setMJournal] = useState(false);
  const [showRiddleAns, setShowRiddleAns] = useState(false);

  const tier = useMemo(() => [...TIERS].reverse().find(t => pts >= t.min) || TIERS[0], [pts]);
  const nxtTier = useMemo(() => TIERS.find(t => t.min > pts), [pts]);
  const badges = useMemo(() => BADGES.filter(b => b.req(tasks, strk, pts)), [tasks, strk, pts]);
  const summerStarted = new Date() >= new Date(profile.startDate);
  const summerEnded = new Date() >= new Date(profile.endDate);
  const dl = daysLeft(profile.endDate);
  const daysUntil = daysLeft(profile.startDate);
  const summerTotal = Math.max(1, Math.ceil((new Date(profile.endDate) - new Date(profile.startDate)) / 86400000));

  const tForDate = (d) => tasks.filter(t => t.date === d);
  const eForDate = (d) => [...evts.filter(e => e.date === d), ...famEvt.filter(e => e.date === d)];
  const cToday = tasks.filter(t => t.done && t.date === today()).length;
  const tToday = tasks.filter(t => t.date === today()).length;

  // Check for newly completed weeks to add to draw entries
  useEffect(() => {
    const weekStart = getWeekStartDate(today());
    const weekDates = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      return dk(d.getFullYear(), d.getMonth(), d.getDate());
    });
    const allTasksDone = weekDates.every(dd => {
      const dayTasks = tasks.filter(t => t.date === dd);
      return dayTasks.length > 0 && dayTasks.every(t => t.done);
    });
    if (allTasksDone && !drawEntries.includes(weekStart)) {
      sDrawE(prev => [...prev, weekStart]);
    }
  }, [tasks, drawEntries]);

  // Collectibles unlock check
  useEffect(() => {
    const newUnlocked = [];
    COLLECTIBLES.forEach(c => {
      if (!collect.includes(c.id)) {
        if (c.requirement <= pts) {
          newUnlocked.push(c.id);
        }
      }
    });
    if (newUnlocked.length > 0) {
      setConfetti(true);
      sCollect(prev => [...prev, ...newUnlocked]);
    }
  }, [pts, collect]);

  // Morning reminder
  useEffect(() => {
    const t = setTimeout(() => {
      const todayTasks = (aTask[childId] || []).filter(t => t.date === today());
      const undone = todayTasks.filter(t => !t.done).length;
      if (undone > 0) {
        addNotif("Good Morning!", `You have ${undone} task${undone > 1 ? "s" : ""} today. Let's go!`, "☀️", "reminder");
      } else if (todayTasks.length === 0) {
        addNotif("Good Morning!", "No tasks today — add some or enjoy a free day!", "🌴", "reminder");
      }
    }, 1500);
    return () => clearTimeout(t);
  }, []);

  // ── Actions ──
  const doComplete = (id) => {
    sT(prev => prev.map(t => {
      if (t.id !== id || t.done) return t;
      const d = DIFFS.find(x => x.id === t.diff);
      const mult = strk >= 7 ? 1.5 : strk >= 3 ? 1.2 : 1;
      const earnedPoints = Math.round(d.points * mult);
      sP(pp => pp + earnedPoints);
      const newStreak = strk + 1;
      sS(ss => ss + 1);
      setConfetti(true);
      addNotif("Task Complete!", `+${earnedPoints} points earned`, "✅", "reward");
      if (newStreak === 3) addNotif("Streak Alert!", "3-day streak! Keep it going for bonus points", "🔥", "streak");
      if (newStreak === 7) addNotif("Unstoppable!", "7-day streak! You're earning 1.5x points!", "⚡", "streak");
      return { ...t, done: true };
    }));
  };
  const doAddTask = () => {
    if (!nTask.title.trim()) return;
    sT(prev => [...prev, { id: `t${Date.now()}`, title: nTask.title, cat: nTask.cat, diff: nTask.diff, date: nTask.date, done: false }]);
    setNTask({ title: "", cat: "academic", diff: "easy", date: selDate || "" });
    setMAddTask(false);
  };
  const doSugg = (catId, s) => {
    sT(prev => [...prev, { id: `t${Date.now()}${Math.random()}`, title: s.t, cat: catId, diff: s.d, date: today(), done: false }]);
  };
  const doDelTask = (id) => sT(prev => prev.filter(t => t.id !== id));
  const doMoveTask = (id, newDate) => sT(prev => prev.map(t => t.id === id ? { ...t, date: newDate } : t));

  const doRedeem = (r) => {
    if (pts < r.cost) return;
    sP(pp => pp - r.cost);
    sD(prev => [...prev, { ...r, at: new Date().toISOString() }]);
    setConfetti(true);
    addNotif("Reward Unlocked!", `You redeemed: ${r.name}`, r.icon, "reward");
  };
  const doAddRew = () => {
    if (!nRew.name.trim()) return;
    sR(prev => [...prev, { ...nRew, id: `r${Date.now()}` }]);
    setNRew({ name: "", cost: 100, icon: "🎁" });
    setMAddRew(false);
  };
  const doDelRew = (id) => sR(prev => prev.filter(r => r.id !== id));

  const doAddEvt = () => {
    if (!nEvt.title.trim()) return;
    const base = { title: nEvt.title, time: nEvt.time, mand: nEvt.mand };
    if (nEvt.rec && nEvt.rDays.length > 0) {
      const allDates = [];
      nEvt.rDays.forEach(d => allDates.push(...expandRec(profile.startDate, profile.endDate, d)));
      const newEvts = allDates.map((dd, i) => ({
        id: `e${Date.now()}-${i}`, date: dd, ...base, rec: true,
        recLabel: nEvt.rDays.map(d => DF[d].slice(0, 3)).join(", "),
      }));
      if (nEvt.fam) setFamEvt(prev => [...prev, ...newEvts]);
      else sE(prev => [...prev, ...newEvts]);
    } else if (nEvt.date) {
      const evt = { id: `e${Date.now()}`, date: nEvt.date, ...base, rec: false };
      if (nEvt.fam) setFamEvt(prev => [...prev, evt]);
      else sE(prev => [...prev, evt]);
    }
    setNEvt({ title: "", date: "", time: "", rec: false, rDays: [], fam: false, mand: false });
    setMAddEvt(false);
  };
  const doDelEvt = (id) => { sE(prev => prev.filter(e => e.id !== id)); setFamEvt(prev => prev.filter(e => e.id !== id)); };
  const doDelRecGrp = (title) => { sE(prev => prev.filter(e => !(e.rec && e.title === title))); setFamEvt(prev => prev.filter(e => !(e.rec && e.title === title))); };

  const applyTmpl = (tmpl) => {
    const s = new Date(profile.startDate);
    const e = new Date(profile.endDate);
    const d = new Date(s);
    const nt = [];
    while (d <= e) {
      const dow = d.getDay();
      if (dow > 0 && dow < 6) {
        tmpl.tasks.forEach((task, i) => {
          nt.push({ id: `tp${d.getTime()}-${i}`, title: task.t, cat: task.cat, diff: task.d, date: dk(d.getFullYear(), d.getMonth(), d.getDate()), done: false });
        });
      }
      d.setDate(d.getDate() + 1);
    }
    sT(prev => [...prev, ...nt]);
    setMTmpl(false);
    setConfetti(true);
  };

  const doLuckyDraw = () => {
    if (drawEntries.length === 0) return;
    const pickIdx = Math.floor(Math.random() * DEF_REWARDS.length);
    const bonus = DEF_REWARDS[pickIdx];
    setDrawWinner(bonus);
    sDrawR(prev => [...prev, { ...bonus, drawDate: new Date().toISOString() }]);
    setConfetti(true);
  };

  const weekDates = useMemo(() => weekDatesFor(weekRef), [weekRef]);
  const catStats = useMemo(() => CATS.map(c => ({ name: c.label, value: tasks.filter(t => t.done && t.cat === c.id).length, fill: c.hex })).filter(c => c.value > 0), [tasks]);
  const wkStats = useMemo(() => {
    const now = new Date();
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(now);
      d.setDate(d.getDate() - (6 - i));
      const dd = dk(d.getFullYear(), d.getMonth(), d.getDate());
      return { day: DS[d.getDay()], done: tasks.filter(t => t.done && t.date === dd).length, total: tasks.filter(t => t.date === dd).length };
    });
  }, [tasks]);

  // Drag
  const onDS = (e, id) => { setDragId(id); e.dataTransfer.effectAllowed = "move"; };
  const onDO = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
  const onDrop = (e, dd) => { e.preventDefault(); if (dragId) { doMoveTask(dragId, dd); setDragId(null); } };

  // NAV
  const NAV = [
    { id: "dashboard", label: "Dashboard", Ic: Sun },
    { id: "calendar", label: "Calendar", Ic: CalIcon },
    { id: "tasks", label: "Tasks", Ic: CheckCircle2 },
    { id: "rewards", label: "Rewards", Ic: Gift },
    { id: "collectibles", label: "Collectibles", Ic: Sparkles },
    { id: "progress", label: "Progress", Ic: BarChart3 },
    { id: "avatar", label: "Avatar", Ic: UserPlus },
    { id: "journal", label: "Journal", Ic: BookOpen },
    { id: "trophy", label: "Trophy", Ic: Trophy },
  ];
  if (isP) NAV.push({ id: "family", label: "Family", Ic: Users });

  // ── TaskItem ──
  const TI = ({ t: task, compact }) => {
    const cat = CATS.find(c => c.id === task.cat);
    const diff = DIFFS.find(d => d.id === task.diff);
    return (
      <div draggable onDragStart={e => onDS(e, task.id)}
        className={cn("flex items-center gap-2 p-2 rounded-lg hover:bg-gray-50 group", compact && "py-1")}>
        <GripVertical className="w-3 h-3 text-gray-300 opacity-0 group-hover:opacity-100 cursor-grab flex-shrink-0" />
        <button onClick={() => !task.done && doComplete(task.id)}
          className={cn("w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0",
            task.done ? "bg-green-500 border-green-500" : `${cat?.border} hover:border-green-400`)}>
          {task.done && <Check className="w-3 h-3 text-white" />}
        </button>
        <div className="flex-1 min-w-0">
          <div className={cn("text-sm truncate", task.done && "line-through text-gray-400", compact && "text-xs")}>{task.title}</div>
          {!compact && (
            <div className="flex gap-1 mt-0.5">
              <span className={cn("text-[10px] px-1 py-0.5 rounded", cat?.light, cat?.text)}>{cat?.label}</span>
              <span className={cn("text-[10px] px-1 py-0.5 rounded", diff?.bg, diff?.color)}>+{diff?.points}</span>
            </div>
          )}
        </div>
        {!task.done && (
          <button onClick={() => doDelTask(task.id)}
            className="p-0.5 opacity-0 group-hover:opacity-100 hover:bg-red-50 rounded text-gray-300 hover:text-red-400">
            <Trash2 className="w-3.5 h-3.5" />
          </button>
        )}
      </div>
    );
  };

  /* ── VIEWS ── */

  // DASHBOARD
  const Dashboard = () => {
    return (
      <div className="space-y-4">
        <div className={cn("rounded-xl p-3 bg-gradient-to-r text-white flex items-center gap-3", grad)}>
          <Timer className="w-7 h-7 text-white/80" />
          {!summerStarted ? (
            <>
              <div>
                <div className="text-2xl font-bold">{daysUntil}</div>
                <div className="text-white/70 text-xs">days until summer starts!</div>
              </div>
              <div className="ml-auto text-right">
                <div className="text-sm font-medium">🏖️</div>
                <div className="text-white/70 text-xs">{fmtDate(profile.startDate).replace(/,\s*$/, "")}</div>
              </div>
            </>
          ) : summerEnded ? (
            <>
              <div>
                <div className="text-2xl font-bold">Summer's over!</div>
                <div className="text-white/70 text-xs">Great job this summer</div>
              </div>
              <div className="ml-auto text-right">
                <div className="text-sm font-medium">100%</div>
                <div className="text-white/70 text-xs">complete</div>
              </div>
            </>
          ) : (
            <>
              <div>
                <div className="text-2xl font-bold">{dl}</div>
                <div className="text-white/70 text-xs">days of summer left</div>
              </div>
              <div className="ml-auto text-right">
                <div className="text-sm font-medium">{Math.round((1 - dl / summerTotal) * 100)}%</div>
                <div className="text-white/70 text-xs">complete</div>
              </div>
            </>
          )}
        </div>

        <div className={cn("rounded-2xl p-5 bg-gradient-to-r text-white", grad)}>
          <div className="flex items-center justify-between">
            <div>
              <div>
                <h1 className="text-xl font-bold">Hey, {child.name}!</h1>
                <p className="text-white/80 text-sm mt-0.5">
                  {cToday === 0 && tToday === 0 ? "Add tasks to get started!" :
                    cToday === tToday && tToday > 0 ? "All done today!" :
                      `${cToday}/${tToday} tasks done`}
                </p>
              </div>
            </div>
            <div className="text-right">
              <div className="text-2xl font-bold">{pts}</div>
              <div className="text-white/80 text-xs">points</div>
            </div>
          </div>
          {strk > 0 && (
            <div className="flex items-center gap-1.5 mt-2 bg-white/20 rounded-lg px-2.5 py-1 w-fit text-sm">
              <Flame className="w-3.5 h-3.5" />{strk} day streak!
            </div>
          )}
        </div>

        {(() => {
          const chapters = STORY_CHAPTERS[child.vibe] || STORY_CHAPTERS.space;
          const currentChapter = [...chapters].reverse().find(c => pts >= c.milestone) || chapters[0];
          const currentIdx = chapters.findIndex(c => c.id === currentChapter.id || (c.title === currentChapter.title && c.milestone === currentChapter.milestone));
          const unlockedCount = chapters.filter(c => pts >= c.milestone).length;
          const nextChapter = chapters[currentIdx + 1];
          const progressToNext = nextChapter ? Math.min(100, ((pts - currentChapter.milestone) / (nextChapter.milestone - currentChapter.milestone)) * 100) : 100;
          return (
            <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
              <h3 className="font-bold text-gray-800 text-sm mb-2">Story Progress</h3>
              <div className="mb-3">
                <div className="text-base font-semibold text-indigo-600">{currentChapter.title}</div>
                <div className="text-xs text-gray-600">{currentChapter.desc}</div>
              </div>
              {nextChapter && (
                <div className="mb-2">
                  <div className="h-2 bg-gray-100 rounded-full overflow-hidden">
                    <div className={cn("h-full rounded-full bg-gradient-to-r", grad)} style={{ width: `${progressToNext}%` }} />
                  </div>
                </div>
              )}
              <div className="text-xs text-gray-500">{unlockedCount} of {chapters.length} chapters unlocked</div>
            </div>
          );
        })()}

        {(() => {
          const hashDate = (d) => {
            const [y, m, day] = d.split("-").map(Number);
            return (y * 367 + m * 31 + day) % FUN_FACTS.length;
          };
          const todayFact = FUN_FACTS[hashDate(today())];
          return (
            <div className="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
              <div className="flex items-start gap-3">
                <span className="text-2xl flex-shrink-0">💡</span>
                <div className="flex-1 min-w-0">
                  <div className="text-xs font-bold text-indigo-600 mb-1 uppercase">{todayFact.type === "riddle" ? "Riddle of the Day" : "Did You Know?"}</div>
                  <p className="text-sm text-gray-700">{todayFact.text}</p>
                  {todayFact.type === "riddle" && (
                    <button onClick={() => setShowRiddleAns(!showRiddleAns)}
                      className="mt-2 text-xs text-indigo-600 font-medium hover:underline">
                      {showRiddleAns ? "Hide Answer" : "Show Answer"}
                    </button>
                  )}
                  {todayFact.type === "riddle" && showRiddleAns && (
                    <div className="mt-2 p-2 bg-indigo-50 rounded text-sm text-indigo-700 font-medium">
                      {todayFact.answer}
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })()}

        <div className="grid grid-cols-3 gap-3">
          <div className="bg-white rounded-xl p-3 border border-gray-100 shadow-sm text-center">
            <div className="text-xl font-bold text-indigo-600">{tasks.filter(t => t.done).length}</div>
            <div className="text-[10px] text-gray-500">Tasks Done</div>
          </div>
          <div className="bg-white rounded-xl p-3 border border-gray-100 shadow-sm text-center">
            <div className="text-base font-bold text-amber-600">{tier.icon} {tier.name}</div>
            <div className="text-[10px] text-gray-500">Tier</div>
          </div>
          <div className="bg-white rounded-xl p-3 border border-gray-100 shadow-sm text-center">
            <div className="text-xl font-bold text-green-600">{badges.length}</div>
            <div className="text-[10px] text-gray-500">Badges</div>
          </div>
        </div>

        {nxtTier && (
          <div className="bg-white rounded-xl p-3 border border-gray-100 shadow-sm">
            <div className="flex justify-between text-xs mb-1.5">
              <span className="text-gray-600">To {nxtTier.icon} {nxtTier.name}</span>
              <span className="font-medium">{pts}/{nxtTier.min}</span>
            </div>
            <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden">
              <div className={cn("h-full rounded-full bg-gradient-to-r", grad)}
                style={{ width: `${Math.min(100, (pts / nxtTier.min) * 100)}%` }} />
            </div>
          </div>
        )}

        {/* Today's weather – live API only, no simulation */}
        {wxLoading ? (
          <div className="flex items-center gap-3 bg-sky-50 rounded-xl p-3 border border-sky-100">
            <Loader2 className="w-5 h-5 text-sky-400 animate-spin" />
            <span className="text-sm text-sky-600">Fetching today's weather for {profile.zip}...</span>
          </div>
        ) : todayWx ? (
          <div className="flex items-center gap-3 bg-sky-50 rounded-xl p-3 border border-sky-100">

            className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="Time (optional)" />
          <button onClick={doAddEvt}
            disabled={!nEvt.title.trim() || (!nEvt.rec && !nEvt.date) || (nEvt.rec && !nEvt.rDays.length)}
            className={cn("w-full py-2.5 rounded-lg font-medium text-white",
              nEvt.title.trim() ? `bg-gradient-to-r ${grad}` : "bg-gray-200 text-gray-400 cursor-not-allowed")}>
            {nEvt.rec ? "Create recurring events" : "Add Event"}
          </button>
        </div>
      </Modal>

      <Modal show={mSugg} onClose={() => setMSugg(false)} title="Suggested Tasks">
        <p className="text-sm text-gray-500 mb-3">Tap to add to today!</p>
        <div className="space-y-3 max-h-96 overflow-auto">
          {CATS.map(cat => (
            <div key={cat.id}>
              <div className={cn("flex items-center gap-2 mb-1.5", cat.text)}>
                <cat.icon className="w-4 h-4" /><span className="font-semibold text-sm">{cat.label}</span>
              </div>
              <div className="space-y-0.5 ml-6">
                {(SUGG[cat.id] || []).map((s, i) => {
                  const diff = DIFFS.find(d => d.id === s.d);
                  return (
                    <button key={i} onClick={() => doSugg(cat.id, s)}
                      className="flex items-center gap-2 w-full text-left p-1.5 rounded-lg hover:bg-gray-50">
                      <Plus className="w-3 h-3 text-gray-400" />
                      <span className="text-sm text-gray-700 flex-1">{s.t}</span>
                      <span className={cn("text-[10px] px-1 py-0.5 rounded", diff?.bg, diff?.color)}>+{diff?.points}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </Modal>

      <Modal show={mTmpl} onClose={() => setMTmpl(false)} title="Schedule Templates" wide>
        <p className="text-sm text-gray-500 mb-3">One-click to fill your entire summer!</p>
        <div className="space-y-3">
          {TEMPLATES.map(tmpl => (
            <div key={tmpl.id} className="bg-white border border-gray-100 rounded-xl p-4 hover:border-indigo-200 transition-all">
              <div className="flex items-start gap-3">
                <span className="text-2xl">{tmpl.icon}</span>
                <div className="flex-1">
                  <div className="font-bold text-gray-800">{tmpl.name}</div>
                  <div className="text-xs text-gray-500 mt-0.5">{tmpl.desc}</div>
                  <div className="mt-2 space-y-0.5">
                    {tmpl.tasks.map((t, i) => {
                      const cat = CATS.find(c => c.id === t.cat);
                      return (
                        <div key={i} className="flex items-center gap-1.5 text-xs">
                          <div className={cn("w-1.5 h-1.5 rounded-full", cat?.color)} />
                          <span className="text-gray-600">{t.t}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <button onClick={() => applyTmpl(tmpl)}
                  className={cn("px-3 py-1.5 rounded-lg text-xs font-medium text-white bg-gradient-to-r flex-shrink-0", grad)}>
                  Apply
                </button>
              </div>
            </div>
          ))}
        </div>
      </Modal>

      <Modal show={mAddRew} onClose={() => setMAddRew(false)} title="Custom Reward">
        <div className="space-y-4">
          <input type="text" value={nRew.name} onChange={e => setNRew(r => ({ ...r, name: e.target.value }))}
            className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" placeholder="Reward name" />
          <input type="number" min="1" value={nRew.cost} onChange={e => setNRew(r => ({ ...r, cost: Math.max(1, Number(e.target.value)) }))}
            className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" />
          <div className="flex flex-wrap gap-2">
            {REWARD_ICONS.map(ic => (
              <button key={ic} onClick={() => setNRew(r => ({ ...r, icon: ic }))}
                className={cn("w-10 h-10 rounded-lg text-xl flex items-center justify-center border-2",
                  nRew.icon === ic ? "border-amber-400 bg-amber-50" : "border-gray-200")}>
                {ic}
              </button>
            ))}
          </div>
          <button onClick={doAddRew} disabled={!nRew.name.trim()}
            className={cn("w-full py-2.5 rounded-lg font-medium text-white",
              nRew.name.trim() ? "bg-amber-500 hover:bg-amber-600" : "bg-gray-200 text-gray-400 cursor-not-allowed")}>
            Create Reward
          </button>
        </div>
      </Modal>

      <Modal show={mDraw} onClose={() => setMDraw(false)} title="Lucky Draw Results" wide>
        <div className="space-y-4">
          <div className="text-center">
            <p className="text-sm text-gray-600 mb-4">You've completed <span className="font-bold">{drawEntries.length}</span> full week(s)!</p>
          </div>
          {drawWinner && (
            <div className={cn("rounded-xl border-2 p-4 text-center bg-gradient-to-br text-white", grad)}>
              <div className="text-4xl mb-2">🎉</div>
              <p className="text-sm mb-2">Your Lucky Draw Prize:</p>
              <div className="text-5xl mb-2">{drawWinner.icon}</div>
              <p className="text-lg font-bold">{drawWinner.name}</p>
            </div>
          )}
          {drawResults.length > 0 && (
            <div>
              <h4 className="text-sm font-bold text-gray-700 mb-2">Past Wins</h4>
              <div className="space-y-1.5">
                {drawResults.map((r, i) => (
                  <div key={i} className="flex items-center gap-2 p-2 bg-green-50 rounded-lg">
                    <span className="text-lg">{r.icon}</span>
                    <span className="text-sm font-medium text-green-800 flex-1">{r.name}</span>
                    <Check className="w-4 h-4 text-green-500" />
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </Modal>

      <Modal show={mJournal} onClose={() => setMJournal(false)} title="New Journal Entry">
        {(() => {
          const [nEntry, setNEntry] = useState({ date: today(), text: "", mood: "😊" });
          const moods = ["😊", "😐", "😢", "😎", "🤩"];
          const doAddEntry = () => {
            if (!nEntry.text.trim()) return;
            sJournal(prev => [...prev, { id: `j${Date.now()}`, date: nEntry.date, text: nEntry.text, mood: nEntry.mood }]);
            setNEntry({ date: today(), text: "", mood: "😊" });
            setMJournal(false);
          };
          return (
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-600 mb-1">Date</label>
                <input type="date" value={nEntry.date} onChange={e => setNEntry(n => ({ ...n, date: e.target.value }))}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm" />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-600 mb-2">Mood</label>
                <div className="flex gap-2">
                  {moods.map(m => (
                    <button key={m} onClick={() => setNEntry(n => ({ ...n, mood: m }))}
                      className={cn("w-10 h-10 rounded-lg border-2 text-lg", nEntry.mood === m ? "bg-indigo-50 border-indigo-500" : "border-gray-200 hover:bg-gray-50")}>
                      {m}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-600 mb-1">Entry</label>
                <textarea value={nEntry.text} onChange={e => setNEntry(n => ({ ...n, text: e.target.value }))}
                  className="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm h-32 resize-none" placeholder="Write your thoughts..." />
              </div>
              <button onClick={doAddEntry} disabled={!nEntry.text.trim()}
                className={cn("w-full py-2.5 rounded-lg font-medium text-white",
                  nEntry.text.trim() ? `bg-gradient-to-r ${grad}` : "bg-gray-200 text-gray-400 cursor-not-allowed")}>
                Save Entry
              </button>
            </div>
          );
        })()}
      </Modal>
    </div>
  );
}

  </script>

  <!-- Load deps from esm.sh (shared React instance), then compile & run JSX -->
  <script type="module">
    try {
      // Load all deps from esm.sh — it deduplicates React across packages
      const [ReactMod, ReactDOMMod, lucideReactMod, RechartsMod] = await Promise.all([
        import("https://esm.sh/react@18.3.1"),
        import("https://esm.sh/react-dom@18.3.1/client"),
        import("https://esm.sh/lucide-react@0.383.0"),
        import("https://esm.sh/recharts@2.12.7"),
      ]);

      // Assign to globals so Babel-compiled code can access them
      window.React = ReactMod.default || ReactMod;
      window.createRoot = ReactDOMMod.createRoot;
      window.lucideReact = lucideReactMod;
      window.Recharts = RechartsMod;

      // Get the JSX source and compile with Babel
      const jsxSource = document.getElementById("app-jsx").textContent;
      const compiled = Babel.transform(jsxSource, {
        presets: ["react"],
        filename: "App.jsx",
      }).code;

      // Inject compiled code as a regular script (runs in global scope)
      const script = document.createElement("script");
      script.textContent = compiled;
      document.head.appendChild(script);
    } catch (err) {
      document.getElementById("root").innerHTML =
        '<div style="padding:2rem;font-family:system-ui;color:#ef4444;">' +
        '<h2>Failed to load</h2><pre style="white-space:pre-wrap;font-size:13px;">' +
        err.message + '\n' + (err.stack || '') + '</pre>' +
        '<p style="color:#666;margin-top:1rem;">Check your internet connection and try refreshing.</p></div>';
    }
  </script>
