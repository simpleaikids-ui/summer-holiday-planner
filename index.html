<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Summer Holiday Planner - Plan activities, earn points, and have an amazing summer!" />
  <meta name="theme-color" content="#6366f1" />
  <title>Summer Holiday Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ── Playful typography ── */
    html, body {
      font-family: 'Nunito', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    /* Fredoka at 700 is chunky — cap display text at 500/600 for clean look */
    h1, h2, h3, .font-display { font-family: 'Fredoka', 'Nunito', sans-serif; letter-spacing: -0.005em; font-weight: 600; }
    .font-display.font-bold, h1.font-bold, h2.font-bold, h3.font-bold { font-weight: 600; }

    /* ── Layout helpers ── */
    .safe-area-pb { padding-bottom: env(safe-area-inset-bottom, 0px); }
    @media print { nav, header, aside, button { display: none !important; } main { margin: 0 !important; padding: 0 !important; } }
    body { margin: 0; }

    /* ── Fun animated app background (sunny-sky vibe with floating blobs) ── */
    .kid-bg {
      background:
        radial-gradient(at 15% 10%, rgba(253, 224, 71, 0.35) 0%, transparent 45%),
        radial-gradient(at 85% 5%, rgba(244, 114, 182, 0.28) 0%, transparent 45%),
        radial-gradient(at 80% 90%, rgba(96, 165, 250, 0.28) 0%, transparent 50%),
        radial-gradient(at 10% 85%, rgba(167, 243, 208, 0.35) 0%, transparent 45%),
        linear-gradient(180deg, #fef3c7 0%, #fce7f3 50%, #dbeafe 100%);
      background-attachment: fixed;
    }

    /* ── Animations ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes wiggle { 0%, 100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
    @keyframes float-y { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes bounce-soft { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-4px) scale(1.04); } }
    @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 50% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); } }
    @keyframes sparkle { 0%, 100% { opacity: 0.3; transform: scale(0.8) rotate(0); } 50% { opacity: 1; transform: scale(1.2) rotate(180deg); } }
    @keyframes pop-in { 0% { transform: scale(0.5); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-2px) rotate(-1deg); } 75% { transform: translateX(2px) rotate(1deg); } }
    @keyframes slide-up { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes shine { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes gradient-pan { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }

    .animate-wiggle { animation: wiggle 0.6s ease-in-out infinite; transform-origin: center bottom; }
    .animate-float { animation: float-y 3s ease-in-out infinite; }
    .animate-bounce-soft { animation: bounce-soft 1.6s ease-in-out infinite; }
    .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
    .animate-sparkle { animation: sparkle 2s ease-in-out infinite; }
    .animate-pop-in { animation: pop-in 0.45s cubic-bezier(.34,1.56,.64,1); }
    .animate-slide-up { animation: slide-up 0.35s ease-out; }

    /* Kid-friendly card look */
    .kid-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .kid-card:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 12px 28px -8px rgba(99, 102, 241, 0.25); }

    /* Shimmery progress bar */
    .progress-shine {
      background-image: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 100%);
      background-size: 200% 100%;
      animation: shine 2.2s linear infinite;
    }

    /* Animated gradient for hero */
    .gradient-pan { background-size: 200% 200%; animation: gradient-pan 8s ease infinite; }

    /* Rainbow text for celebrations */
    .rainbow-text {
      background: linear-gradient(90deg, #ef4444, #f59e0b, #10b981, #3b82f6, #8b5cf6, #ec4899);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 3s linear infinite;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #a5b4fc, #818cf8); border-radius: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Friendlier focus */
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 3px solid #fbbf24; outline-offset: 2px; border-radius: 10px;
    }

    /* Floating decorative emojis (behind content) */
    .emoji-bg { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .emoji-bg span { position: absolute; opacity: 0.15; font-size: 2.2rem; animation: float-y 6s ease-in-out infinite; }

    /* Loading */
    #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Fredoka', system-ui; color: #6366f1; gap: 10px; }
    #loading .spinner { width: 48px; height: 48px; border: 4px solid #e0e7ff; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
    #loading .sun { font-size: 2.5rem; animation: wiggle 1.2s ease-in-out infinite; }
    #loading .label { font-weight: 600; font-size: 1.1rem; }
    #loading .sub { font-size: 0.8rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <div class="sun">☀️</div>
      <div class="spinner"></div>
      <div class="label">Loading Summer Planner...</div>
      <div class="sub">Get ready for an adventure! 🌈</div>
    </div>
  </div>

/* ─── Utility ─── */
const cn = (...c) => c.filter(Boolean).join(" ");
const YEAR = 2026;
const DS = ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"];
const DF = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

function getDIM(m, y) { return new Date(y, m + 1, 0).getDate(); }
function getFDOW(m, y) { return new Date(y, m, 1).getDay(); }
// dk accepts 0-indexed month (as returned by Date.getMonth / cMonth) and
// emits the standard 1-indexed ISO format "YYYY-MM-DD" to stay compatible
// with <input type="date"> values.
function dk(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}
function today() {
  const t = new Date();
  return dk(t.getFullYear(), t.getMonth(), t.getDate());
}
function parsedk(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function fmtDate(s) {
  if (!s) return "";
  return parsedk(s).toLocaleDateString("en-US", {
    weekday: "short", month: "short", day: "numeric"
  });
}
function weekDatesFor(ref) {
  const d = new Date(ref);
  const sun = new Date(d);
  sun.setDate(d.getDate() - d.getDay());
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(sun);
    x.setDate(sun.getDate() + i);
    return dk(x.getFullYear(), x.getMonth(), x.getDate());
  });
}
function expandRec(start, end, dow) {
  const dates = [];
  const s = new Date(start);
  const e = new Date(end);
  const d = new Date(s);
  while (d.getDay() !== dow) d.setDate(d.getDate() + 1);
  while (d <= e) {
    dates.push(dk(d.getFullYear(), d.getMonth(), d.getDate()));
    d.setDate(d.getDate() + 7);
  }
  return dates;
}
function daysLeft(endDate) {
  return Math.max(0, Math.ceil((new Date(endDate) - new Date()) / 86400000));
}
function getWeekStartDate(dateStr) {
  const d = parsedk(dateStr);
  const sun = new Date(d);
  sun.setDate(d.getDate() - d.getDay());
  return dk(sun.getFullYear(), sun.getMonth(), sun.getDate());
}

/* ─── LocalStorage persistence ─── */
const LS_PREFIX = "sp:";
function useLocalState(key, initial) {
  const fullKey = LS_PREFIX + key;
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(fullKey);
      if (raw === null) return typeof initial === "function" ? initial() : initial;
      return JSON.parse(raw);
    } catch { return typeof initial === "function" ? initial() : initial; }
  });
  useEffect(() => {
    try { localStorage.setItem(fullKey, JSON.stringify(state)); } catch {}
  }, [fullKey, state]);
  return [state, setState];
}
function clearAllLocalData() {
  try {
    Object.keys(localStorage)
      .filter(k => k.startsWith(LS_PREFIX))
      .forEach(k => localStorage.removeItem(k));
  } catch {}
}

  80: { icon: "🌧️", label: "Rain Showers", indoor: true },
  81: { icon: "🌧️", label: "Rain Showers", indoor: true },
  82: { icon: "🌧️", label: "Heavy Showers", indoor: true },
  95: { icon: "⛈️", label: "Thunderstorm", indoor: true },
  96: { icon: "⛈️", label: "Thunderstorm", indoor: true },
  99: { icon: "⛈️", label: "Severe Storm", indoor: true },
};
function wmoLookup(code) {
  return WMO_MAP[code] || { icon: "🌤️", label: "Fair", indoor: false };
}

/* Fetch today's real weather for a zip code via Open-Meteo (free, no key).
   Returns null if the API is unavailable (e.g. sandboxed artifact).
   Includes a 5-second timeout so the spinner never gets stuck. */
async function fetchTodayWeather(zip) {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 5000);
    const geoRes = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(zip)}&count=1&language=en&format=json`,
      { signal: controller.signal }
    );
    const geoData = await geoRes.json();
    if (!geoData.results || geoData.results.length === 0) { clearTimeout(timeout); return null; }
    const { latitude: lat, longitude: lon, name: locName } = geoData.results[0];
    const wxRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&daily=temperature_2m_max,temperature_2m_min,weather_code` +
      `&temperature_unit=fahrenheit&timezone=auto&forecast_days=1`,
      { signal: controller.signal }
    );
    clearTimeout(timeout);
    const wxData = await wxRes.json();
    if (!wxData.daily || !wxData.daily.time.length) return null;
    const wmo = wmoLookup(wxData.daily.weather_code[0]);
    return {
      locName,
      hi: Math.round(wxData.daily.temperature_2m_max[0]),
      lo: Math.round(wxData.daily.temperature_2m_min[0]),
      icon: wmo.icon,
      label: wmo.label,
      indoor: wmo.indoor,
    };
  } catch (err) {
    return null; // API blocked, network error, or timeout
  }
}

/* ─── Confetti ─── */
function Confetti({ show, onDone }) {
  const [pts, setPts] = useState([]);
  useEffect(() => {
    if (!show) return;
    const emojis = ["⭐", "✨", "🎉", "💖", "🌟", "🎊", "🦄", "🌈"];
    const colors = ["#f59e0b", "#3b82f6", "#ef4444", "#10b981", "#8b5cf6", "#ec4899", "#14b8a6", "#f97316"];
    setPts(Array.from({ length: 70 }, (_, i) => {
      const isEmoji = Math.random() < 0.35;
      return {
        id: i,
        x: Math.random() * 100,
        dl: Math.random() * 0.8,
        col: colors[i % colors.length],
        sz: 6 + Math.random() * 10,
        dur: 1.6 + Math.random() * 1.2,
        drift: (Math.random() - 0.5) * 120,
        emoji: isEmoji ? emojis[Math.floor(Math.random() * emojis.length)] : null,
        shape: Math.random() < 0.5 ? "circle" : "square",
      };
    }));
    const t = setTimeout(() => { setPts([]); onDone?.(); }, 2800);
    return () => clearTimeout(t);
  }, [show]);
  if (!pts.length) return null;
  return (
    <div className="fixed inset-0 pointer-events-none z-50">
      {pts.map(p => p.emoji ? (
        <div key={p.id} className="absolute" style={{
          left: `${p.x}%`, top: -20, fontSize: `${p.sz + 10}px`,
          animation: `cfall ${p.dur}s cubic-bezier(.3,.1,.3,1) ${p.dl}s forwards`,
          "--drift": `${p.drift}px`,
        }}>{p.emoji}</div>
      ) : (
        <div key={p.id} className="absolute" style={{
          left: `${p.x}%`, top: -10, width: p.sz, height: p.sz,
          backgroundColor: p.col, borderRadius: p.shape === "circle" ? "50%" : "2px",
          animation: `cfall ${p.dur}s cubic-bezier(.3,.1,.3,1) ${p.dl}s forwards`,
          "--drift": `${p.drift}px`,
        }} />
      ))}
      <style>{`@keyframes cfall{0%{transform:translate(0,0) rotate(0);opacity:1}100%{transform:translate(var(--drift,0),105vh) rotate(900deg);opacity:0}}`}</style>
    </div>
  );
}

/* ─── Toast Notification ─── */
function Toast({ notifications, onDismiss }) {
  if (!notifications.length) return null;
  return (
    <div className="fixed top-4 right-4 z-50 space-y-2 max-w-sm">
      {notifications.map(n => (
        <div key={n.id} className={cn(
          "flex items-start gap-3 p-3 rounded-2xl shadow-xl border-2 animate-slide-in backdrop-blur-sm",
          n.type === "streak" ? "bg-gradient-to-r from-orange-100 to-amber-100 border-orange-300" :
          n.type === "reward" ? "bg-gradient-to-r from-amber-100 to-yellow-100 border-amber-300" :
          n.type === "reminder" ? "bg-gradient-to-r from-blue-100 to-sky-100 border-blue-300" :
          "bg-white border-indigo-200"
        )}>
          <span className="text-2xl flex-shrink-0 animate-bounce-soft">{n.icon}</span>
          <div className="flex-1 min-w-0">
            <div className="text-sm font-bold text-gray-800 font-display">{n.title}</div>

          </button>
        </div>
      ))}
      <style>{`@keyframes slide-in{from{transform:translateX(100%) scale(0.9);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}.animate-slide-in{animation:slide-in 0.4s cubic-bezier(.34,1.56,.64,1)}`}</style>
    </div>
  );
}

/* ─── Modal ─── */
function Modal({ show, onClose, title, children, wide }) {

}

        <div className="bg-gray-50 rounded-xl p-4 space-y-3">

  );

/* ═══════════════════════════════════
   MAIN APP
   ═══════════════════════════════════ */
function App2({ profile, onClearAll }) {
  const isP = profile.role === "parent";
  const children = isP
    ? profile.children
    : [{ id: "self", name: profile.name, grade: profile.grade, vibe: profile.vibe }];
  const [childId, setChildId] = useState(children[0]?.id);
  const child = children.find(c => c.id === childId) || children[0];
  const vibe = VIBES.find(v => v.id === child?.vibe) || VIBES[0];
  const grad = vibe.gradient;

  const [view, setView] = useState("dashboard");
  const [sideOpen, setSideOpen] = useState(false);
  const [calV, setCalV] = useState("month");
  const [cMonth, setCMonth] = useState(4);
  const [selDate, setSelDate] = useState(today());
  const [weekRef, setWeekRef] = useState(new Date());

  // Per-child state maps (persisted across reloads)
  const init = (def) => Object.fromEntries(children.map(c => [c.id, typeof def === "function" ? def() : def]));
  // Merge any previously-stored per-child map with current children so a new child
  // added via onboarding doesn't throw on missing keys.
  const mergeInit = (def) => (stored) => {
    const base = init(def);
    if (!stored || typeof stored !== "object") return base;
    children.forEach(c => { if (stored[c.id] !== undefined) base[c.id] = stored[c.id]; });
    return base;
  };
  const [aTask, setATask] = useLocalState("aTask", () => init(() => []));
  const [aEvt, setAEvt] = useLocalState("aEvt", () => init(() => []));
  const [famEvt, setFamEvt] = useLocalState("famEvt", []);
  const [aPts, setAPts] = useLocalState("aPts", () => init(0));
  const [aStrk, setAStrk] = useLocalState("aStrk", () => init(0));
  const [aRew, setARew] = useLocalState("aRew", () => init(() => [...DEF_REWARDS]));
  const [aRedm, setARedm] = useLocalState("aRedm", () => init(() => []));
  const [aCollect, setACollect] = useLocalState("aCollect", () => init(() => []));
  const [aDrawEntries, setADrawEntries] = useLocalState("aDrawEntries", () => init(() => []));
  const [aDrawResults, setADrawResults] = useLocalState("aDrawResults", () => init(() => []));
  const [aAvatar, setAAvatar] = useLocalState("aAvatar", () => init(() => ({ body: "#F5D0A9", hair: "👦", eyes: "👀", mouth: "😊", accessory: "" })));
  const [aJournal, setAJournal] = useLocalState("aJournal", () => init(() => []));
  const [aEquip, setAEquip] = useLocalState("aEquip", () => init(() => ({ theme: null, title: null, frame: null })));
  const [leaderboardOn, setLeaderboardOn] = useLocalState("leaderboardOn", true);
  const [mClear, setMClear] = useState(false);

  // Weather – real forecast for today only (via Open-Meteo API)
  const [todayWx, setTodayWx] = useState(null); // { locName, hi, lo, icon, label, indoor } or null
  const [wxLoading, setWxLoading] = useState(true);

  useEffect(() => {
    if (!profile.zip) { setWxLoading(false); return; }
    let cancelled = false;
    (async () => {
      setWxLoading(true);
      const result = await fetchTodayWeather(profile.zip);
      if (!cancelled) { setTodayWx(result); setWxLoading(false); }
    })();
    return () => { cancelled = true; };
  }, [profile.zip]);

  const tasks = aTask[childId] || [];
  const evts = aEvt[childId] || [];
  const pts = aPts[childId] || 0;
  const strk = aStrk[childId] || 0;
  const rews = aRew[childId] || DEF_REWARDS;
  const rdmd = aRedm[childId] || [];
  const collect = aCollect[childId] || [];
  const drawEntries = aDrawEntries[childId] || [];
  const drawResults = aDrawResults[childId] || [];

  const sT = fn => setATask(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sE = fn => setAEvt(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sP = fn => setAPts(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || 0) : fn }));
  const sS = fn => setAStrk(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || 0) : fn }));
  const sR = fn => setARew(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || DEF_REWARDS) : fn }));
  const sD = fn => setARedm(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sCollect = fn => setACollect(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sDrawE = fn => setADrawEntries(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sDrawR = fn => setADrawResults(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));
  const sAvatar = fn => setAAvatar(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || { body: "#F5D0A9", hair: "👦", eyes: "👀", mouth: "😊", accessory: "" }) : fn }));
  const sJournal = fn => setAJournal(prev => ({ ...prev, [childId]: typeof fn === "function" ? fn(prev[childId] || []) : fn }));

  const avatar = aAvatar[childId] || { body: "#F5D0A9", hair: "👦", eyes: "👀", mouth: "😊", accessory: "" };

  // Equipped collectibles — resolved to full objects (or null)
  const equip = aEquip[childId] || { theme: null, title: null, frame: null };
  const activeTheme = COLLECTIBLES.find(c => c.type === "theme" && c.id === equip.theme) || null;
  const activeTitle = COLLECTIBLES.find(c => c.type === "title" && c.id === equip.title) || null;
  const activeFrame = COLLECTIBLES.find(c => c.type === "frame" && c.id === equip.frame) || null;
  const doEquip = (type, id) => setAEquip(prev => ({
    ...prev,
    [childId]: { ...(prev[childId] || { theme: null, title: null, frame: null }), [type]: id },
  }));
  const journal = aJournal[childId] || [];

  const [confetti, setConfetti] = useState(false);
  const [notifications, setNotifications] = useState([]);

  const addNotif = (title, message, icon, type) => {
    const id = `n${Date.now()}`;
    setNotifications(prev => [...prev, { id, title, message, icon, type }]);
    setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 5000);
  };
  const dismissNotif = (id) => setNotifications(prev => prev.filter(n => n.id !== id));

  const [mAddTask, setMAddTask] = useState(false);
  const [mAddEvt, setMAddEvt] = useState(false);
  const [mSugg, setMSugg] = useState(false);
  const [mAddRew, setMAddRew] = useState(false);
  const [mEditRew, setMEditRew] = useState(null);
  const [mTmpl, setMTmpl] = useState(false);
  const [mDraw, setMDraw] = useState(false);
  const [nTask, setNTask] = useState({ title: "", cat: "academic", diff: "easy", date: "" });
  const [nEvt, setNEvt] = useState({ title: "", date: "", time: "", rec: false, rDays: [], fam: false, mand: false });
  const [nRew, setNRew] = useState({ name: "", cost: 100, icon: "🎁" });
  const [dragId, setDragId] = useState(null);
  const [drawWinner, setDrawWinner] = useState(null);

  const [mJournal, setMJournal] = useState(false);
  const [showRiddleAns, setShowRiddleAns] = useState(false);

  const tier = useMemo(() => [...TIERS].reverse().find(t => pts >= t.min) || TIERS[0], [pts]);
  const nxtTier = useMemo(() => TIERS.find(t => t.min > pts), [pts]);
  const badges = useMemo(() => BADGES.filter(b => b.req(tasks, strk, pts)), [tasks, strk, pts]);
  const summerStarted = new Date() >= new Date(profile.startDate);
  const summerEnded = new Date() >= new Date(profile.endDate);
  const dl = daysLeft(profile.endDate);
  const daysUntil = daysLeft(profile.startDate);
  const summerTotal = Math.max(1, Math.ceil((new Date(profile.endDate) - new Date(profile.startDate)) / 86400000));

  const tForDate = (d) => tasks.filter(t => t.date === d);
  const eForDate = (d) => [...evts.filter(e => e.date === d), ...famEvt.filter(e => e.date === d)];
  const cToday = tasks.filter(t => t.done && t.date === today()).length;
  const tToday = tasks.filter(t => t.date === today()).length;

  // Check for newly completed weeks to add to draw entries
  useEffect(() => {
    const weekStart = getWeekStartDate(today());
    const weekDates = Array.from({ length: 7 }, (_, i) => {
      const d = new Date(weekStart);
      d.setDate(d.getDate() + i);
      return dk(d.getFullYear(), d.getMonth(), d.getDate());
    });
    const allTasksDone = weekDates.every(dd => {
      const dayTasks = tasks.filter(t => t.date === dd);
      return dayTasks.length > 0 && dayTasks.every(t => t.done);
    });
    if (allTasksDone && !drawEntries.includes(weekStart)) {
      sDrawE(prev => [...prev, weekStart]);
    }
  }, [tasks, drawEntries]);

  // Collectibles unlock check
  useEffect(() => {
    const newUnlocked = [];
    COLLECTIBLES.forEach(c => {
      if (!collect.includes(c.id)) {
        if (c.requirement <= pts) {
          newUnlocked.push(c.id);
        }
      }
    });
    if (newUnlocked.length > 0) {
      setConfetti(true);
      sCollect(prev => [...prev, ...newUnlocked]);
    }
  }, [pts, collect]);

  // Time-based reminder
  useEffect(() => {
    const t = setTimeout(() => {
      const h = new Date().getHours();
      const g = h < 5 ? { t: "Hi there!", e: "🌙" }
              : h < 12 ? { t: "Good morning!", e: "☀️" }
              : h < 17 ? { t: "Good afternoon!", e: "🌞" }
              : h < 21 ? { t: "Good evening!", e: "🌆" }
              : { t: "Good night!", e: "🌙" };
      const todayTasks = (aTask[childId] || []).filter(t => t.date === today());
      const undone = todayTasks.filter(t => !t.done).length;
      if (undone > 0) {
        addNotif(g.t, `You have ${undone} task${undone > 1 ? "s" : ""} today. Let's go!`, g.e, "reminder");
      } else if (todayTasks.length === 0) {
        addNotif(g.t, "No tasks today — add some or enjoy a free day!", "🌴", "reminder");
      }
    }, 1500);
    return () => clearTimeout(t);
  }, []);

  // ── Actions ──
  const doComplete = (id) => {
    sT(prev => prev.map(t => {
      if (t.id !== id || t.done) return t;
      const d = DIFFS.find(x => x.id === t.diff);
      const mult = strk >= 7 ? 1.5 : strk >= 3 ? 1.2 : 1;
      const earnedPoints = Math.round(d.points * mult);
      sP(pp => pp + earnedPoints);
      const newStreak = strk + 1;
      sS(ss => ss + 1);
      setConfetti(true);
      addNotif("Task Complete!", `+${earnedPoints} points earned`, "✅", "reward");
      if (newStreak === 3) addNotif("Streak Alert!", "3-day streak! Keep it going for bonus points", "🔥", "streak");
      if (newStreak === 7) addNotif("Unstoppable!", "7-day streak! You're earning 1.5x points!", "⚡", "streak");
      return { ...t, done: true };
    }));
  };
  const doAddTask = () => {
    if (!nTask.title.trim()) return;
    sT(prev => [...prev, { id: `t${Date.now()}`, title: nTask.title, cat: nTask.cat, diff: nTask.diff, date: nTask.date, done: false }]);
    setNTask({ title: "", cat: "academic", diff: "easy", date: selDate || "" });
    setMAddTask(false);
  };
  const doSugg = (catId, s) => {
    sT(prev => [...prev, { id: `t${Date.now()}${Math.random()}`, title: s.t, cat: catId, diff: s.d, date: today(), done: false }]);
  };
  const doDelTask = (id) => sT(prev => prev.filter(t => t.id !== id));
  const doMoveTask = (id, newDate) => sT(prev => prev.map(t => t.id === id ? { ...t, date: newDate } : t));

  const doRedeem = (r) => {
    if (pts < r.cost) return;
    sP(pp => pp - r.cost);
    sD(prev => [...prev, { ...r, at: new Date().toISOString() }]);
    setConfetti(true);
    addNotif("Reward Unlocked!", `You redeemed: ${r.name}`, r.icon, "reward");
  };
  const doAddRew = () => {
    if (!nRew.name.trim()) return;
    sR(prev => [...prev, { ...nRew, id: `r${Date.now()}` }]);
    setNRew({ name: "", cost: 100, icon: "🎁" });
    setMAddRew(false);
  };
  const doDelRew = (id) => sR(prev => prev.filter(r => r.id !== id));

  const doAddEvt = () => {
    if (!nEvt.title.trim()) return;
    const base = { title: nEvt.title, time: nEvt.time, mand: nEvt.mand };
    if (nEvt.rec && nEvt.rDays.length > 0) {
      const allDates = [];
      nEvt.rDays.forEach(d => allDates.push(...expandRec(profile.startDate, profile.endDate, d)));
      const newEvts = allDates.map((dd, i) => ({
        id: `e${Date.now()}-${i}`, date: dd, ...base, rec: true,
        recLabel: nEvt.rDays.map(d => DF[d].slice(0, 3)).join(", "),
      }));
      if (nEvt.fam) setFamEvt(prev => [...prev, ...newEvts]);
      else sE(prev => [...prev, ...newEvts]);
    } else if (nEvt.date) {
      const evt = { id: `e${Date.now()}`, date: nEvt.date, ...base, rec: false };
      if (nEvt.fam) setFamEvt(prev => [...prev, evt]);
      else sE(prev => [...prev, evt]);
    }
    setNEvt({ title: "", date: "", time: "", rec: false, rDays: [], fam: false, mand: false });
    setMAddEvt(false);
  };
  const doDelEvt = (id) => { sE(prev => prev.filter(e => e.id !== id)); setFamEvt(prev => prev.filter(e => e.id !== id)); };
  const doDelRecGrp = (title) => { sE(prev => prev.filter(e => !(e.rec && e.title === title))); setFamEvt(prev => prev.filter(e => !(e.rec && e.title === title))); };

  const applyTmpl = (tmpl) => {
    const s = new Date(profile.startDate);
    const e = new Date(profile.endDate);
    const d = new Date(s);
    const nt = [];
    while (d <= e) {
      const dow = d.getDay();
      if (dow > 0 && dow < 6) {
        tmpl.tasks.forEach((task, i) => {
          nt.push({ id: `tp${d.getTime()}-${i}`, title: task.t, cat: task.cat, diff: task.d, date: dk(d.getFullYear(), d.getMonth(), d.getDate()), done: false });
        });
      }
      d.setDate(d.getDate() + 1);
    }
    sT(prev => [...prev, ...nt]);
    setMTmpl(false);
    setConfetti(true);
  };

  const doLuckyDraw = () => {
    if (drawEntries.length === 0) return;
    const pickIdx = Math.floor(Math.random() * DEF_REWARDS.length);
    const bonus = DEF_REWARDS[pickIdx];
    setDrawWinner(bonus);
    sDrawR(prev => [...prev, { ...bonus, drawDate: new Date().toISOString() }]);
    setConfetti(true);
  };

  const weekDates = useMemo(() => weekDatesFor(weekRef), [weekRef]);
  const catStats = useMemo(() => CATS.map(c => ({ name: c.label, value: tasks.filter(t => t.done && t.cat === c.id).length, fill: c.hex })).filter(c => c.value > 0), [tasks]);
  const wkStats = useMemo(() => {
    const now = new Date();
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(now);
      d.setDate(d.getDate() - (6 - i));
      const dd = dk(d.getFullYear(), d.getMonth(), d.getDate());
      return { day: DS[d.getDay()], done: tasks.filter(t => t.done && t.date === dd).length, total: tasks.filter(t => t.date === dd).length };
    });
  }, [tasks]);

  // Drag
  const onDS = (e, id) => { setDragId(id); e.dataTransfer.effectAllowed = "move"; };
  const onDO = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "move"; };
  const onDrop = (e, dd) => { e.preventDefault(); if (dragId) { doMoveTask(dragId, dd); setDragId(null); } };

  // NAV
  const NAV = [
    { id: "dashboard", label: "Dashboard", Ic: Sun },
    { id: "calendar", label: "Calendar", Ic: CalIcon },
    { id: "tasks", label: "Tasks", Ic: CheckCircle2 },
    { id: "rewards", label: "Rewards", Ic: Gift },
    { id: "collectibles", label: "Collectibles", Ic: Sparkles },
    { id: "progress", label: "Progress", Ic: BarChart3 },
    { id: "avatar", label: "Avatar", Ic: UserPlus },
    { id: "journal", label: "Journal", Ic: BookOpen },
    { id: "trophy", label: "Trophy", Ic: Trophy },
  ];
  if (isP) NAV.push({ id: "family", label: "Family", Ic: Users });

  // ── TaskItem ──
  const TI = ({ t: task, compact }) => {
    const cat = CATS.find(c => c.id === task.cat);
    const diff = DIFFS.find(d => d.id === task.diff);
    return (
      <div draggable onDragStart={e => onDS(e, task.id)}
        className={cn("flex items-center gap-2 p-2.5 hover:bg-indigo-50/50 group transition-colors", compact && "py-1.5", task.done && "bg-green-50/40")}>
        <GripVertical className="w-3 h-3 text-gray-300 opacity-0 group-hover:opacity-100 cursor-grab flex-shrink-0" />
        <button onClick={() => !task.done && doComplete(task.id)}
          className={cn("w-7 h-7 rounded-full border-[3px] flex items-center justify-center flex-shrink-0 transition-all shadow-sm",
            task.done
              ? "bg-gradient-to-br from-green-400 to-emerald-500 border-green-500 scale-110"
              : `${cat?.border} bg-white hover:scale-110 hover:border-green-400 hover:shadow-md`)}>
          {task.done && <Check className="w-4 h-4 text-white" strokeWidth={3.5} />}
        </button>
        <div className="flex-1 min-w-0">
          <div className={cn("text-sm truncate font-semibold text-gray-700", task.done && "line-through text-gray-400", compact && "text-xs")}>{task.title}</div>
          {!compact && (
            <div className="flex gap-1 mt-1">
              <span className={cn("text-[10px] px-2 py-0.5 rounded-full font-bold flex items-center gap-0.5", cat?.light, cat?.text, "border", cat?.border)}>
                <cat.icon className="w-2.5 h-2.5" />{cat?.label}
              </span>
              <span className={cn("text-[10px] px-2 py-0.5 rounded-full font-bold", diff?.bg, diff?.color)}>+{diff?.points} ⭐</span>
            </div>
          )}
        </div>
        {!task.done && (
          <button onClick={() => doDelTask(task.id)}
            className="p-1 opacity-0 group-hover:opacity-100 hover:bg-red-100 rounded-full text-gray-300 hover:text-red-500 transition-colors">
            <Trash2 className="w-3.5 h-3.5" />
          </button>
        )}
      </div>
    );
  };

  /* ── VIEWS ── */

  // DASHBOARD
  const Dashboard = () => {
    return (
      <div className="space-y-4 relative z-10">
        <div className={cn("rounded-3xl p-4 bg-gradient-to-r text-white flex items-center gap-3 shadow-lg gradient-pan border-2 border-white/40", grad)}>
          <div className="w-12 h-12 bg-white/25 rounded-2xl flex items-center justify-center text-2xl animate-float flex-shrink-0">
            {!summerStarted ? "⏳" : summerEnded ? "🎉" : "🏖️"}
          </div>
          {!summerStarted ? (
            <>
              <div>
                <div className="text-3xl font-bold font-display drop-shadow">{daysUntil}</div>
                <div className="text-white/90 text-xs font-semibold">days until summer starts! 🚀</div>
              </div>
              <div className="ml-auto text-right">
                <div className="text-xl">🏖️</div>
                <div className="text-white/70 text-[10px] uppercase tracking-wider font-bold">Starts</div>
                <div className="text-white/90 text-xs font-semibold">{fmtDate(profile.startDate).replace(/,\s*$/, "")}</div>
              </div>
            </>
          ) : summerEnded ? (
            <>
              <div>
                <div className="text-2xl font-bold font-display">Summer's over!</div>
                <div className="text-white/90 text-xs font-semibold">🌟 Great job this summer!</div>
              </div>
              <div className="ml-auto text-right">
                <div className="text-lg font-bold">100%</div>
                <div className="text-white/80 text-xs">complete</div>
              </div>
            </>
          ) : (
            <>
              <div>
                <div className="text-3xl font-bold font-display drop-shadow">{dl}</div>
                <div className="text-white/90 text-xs font-semibold">days of summer left! ☀️</div>
              </div>
              <div className="ml-auto text-right">
                <div className="text-lg font-bold">{Math.round((1 - dl / summerTotal) * 100)}%</div>
                <div className="text-white/80 text-xs">complete</div>
              </div>
            </>
          )}
        </div>

        <div className={cn("relative rounded-3xl p-6 bg-gradient-to-br text-white shadow-xl overflow-hidden gradient-pan border-2 border-white/40 kid-card", grad)}>
          <div className="absolute -top-6 -right-6 text-6xl opacity-20 animate-wiggle">{vibe.emoji}</div>
          <div className="absolute top-2 left-4 text-xl animate-sparkle">✨</div>
          <div className="absolute bottom-4 right-12 text-lg animate-sparkle" style={{ animationDelay: '1s' }}>⭐</div>
          <div className="flex items-center justify-between relative">
            <div>
              {(() => {
                const h = new Date().getHours();
                const g = h < 5 ? { t: "Night owl", e: "🌙" }
                        : h < 12 ? { t: "Good morning", e: "🌞" }
                        : h < 17 ? { t: "Good afternoon", e: "☀️" }
                        : h < 21 ? { t: "Good evening", e: "🌆" }
                        : { t: "Good night", e: "🌙" };
                const displayName = activeTitle ? `${activeTitle.title} ${child.name}` : child.name;
                return (
                  <h1 className="text-2xl font-bold font-display drop-shadow">
                    {g.t}, {displayName}! <span className="inline-block animate-wiggle">{g.e}</span>
                  </h1>
                );
              })()}
              <p className="text-white/95 text-sm mt-1 font-semibold">
                {cToday === 0 && tToday === 0 ? "✨ Add tasks to start your adventure!" :
                  cToday === tToday && tToday > 0 ? "🎉 All done today — you're amazing!" :
                    `${cToday}/${tToday} tasks done — keep going! 💪`}
              </p>
            </div>
            <div className="text-right">
              <div className="text-3xl font-bold font-display drop-shadow flex items-center gap-1">
                <Star className="w-5 h-5 fill-yellow-200 text-yellow-200 animate-sparkle" />{pts}
              </div>
              <div className="text-white/90 text-xs font-bold uppercase tracking-wider">points</div>
            </div>
          </div>
          {strk > 0 && (
            <div className="flex items-center gap-1.5 mt-3 bg-white/25 backdrop-blur-sm rounded-full px-3 py-1.5 w-fit text-sm font-bold border border-white/30">
              <Flame className="w-4 h-4 text-orange-200 animate-bounce-soft" />{strk} day streak! 🔥
            </div>
          )}
        </div>

        {(() => {
          const chapters = STORY_CHAPTERS[child.vibe] || STORY_CHAPTERS.space;

                <li>All tasks, events, and journal entries</li>
                <li>Points, streaks, badges, and collectibles</li>
                <li>Custom rewards and redemptions</li>
              </ul>
              <p className="text-xs text-red-700 mt-2 font-semibold">You'll be taken back to the welcome screen. This can't be undone.</p>
            </div>
          </div>
          <div className="flex gap-2">
            <button onClick={() => setMClear(false)}
              className="flex-1 py-2.5 rounded-full font-bold text-gray-600 bg-gray-100 hover:bg-gray-200">
              Cancel
            </button>
            <button onClick={() => { setMClear(false); onClearAll?.(); }}
              className="flex-1 py-2.5 rounded-full font-bold text-white bg-gradient-to-r from-red-500 to-rose-500 hover:shadow-lg">
              Yes, clear it
            </button>
          </div>
        </div>
      </Modal>
    </div>
  );
}

  <!-- Load deps from esm.sh (shared React instance), then compile & run JSX -->
  <script type="module">
    try {
      // Load all deps from esm.sh — it deduplicates React across packages
      const [ReactMod, ReactDOMMod, lucideReactMod, RechartsMod] = await Promise.all([
        import("https://esm.sh/react@18.3.1"),
        import("https://esm.sh/react-dom@18.3.1/client"),
        import("https://esm.sh/lucide-react@0.383.0"),
        import("https://esm.sh/recharts@2.12.7"),
      ]);

      // Assign to globals so Babel-compiled code can access them
      window.React = ReactMod.default || ReactMod;
      window.createRoot = ReactDOMMod.createRoot;
      window.lucideReact = lucideReactMod;
      window.Recharts = RechartsMod;

      // Get the JSX source and compile with Babel
      const jsxSource = document.getElementById("app-jsx").textContent;
      const compiled = Babel.transform(jsxSource, {
        presets: ["react"],
        filename: "App.jsx",
      }).code;

      // Inject compiled code as a regular script (runs in global scope)
      const script = document.createElement("script");
      script.textContent = compiled;
      document.head.appendChild(script);
    } catch (err) {
      document.getElementById("root").innerHTML =
        '<div style="padding:2rem;font-family:system-ui;color:#ef4444;">' +
        '<h2>Failed to load</h2><pre style="white-space:pre-wrap;font-size:13px;">' +
        err.message + '\n' + (err.stack || '') + '</pre>' +
        '<p style="color:#666;margin-top:1rem;">Check your internet connection and try refreshing.</p></div>';
    }
  </script>
